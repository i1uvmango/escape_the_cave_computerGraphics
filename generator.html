<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voxel Cave Generator — seed explorer</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d12; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 10px; left: 12px; z-index: 10;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #cdd6e4; background: rgba(10, 14, 22, 0.6);
      padding: 8px 10px; border-radius: 6px; pointer-events: none;
      border: 1px solid rgba(120, 140, 180, 0.25);
    }
    #hud b { color: #8fb6ff; font-weight: 600; }
    #legend {
      position: fixed; bottom: 10px; left: 12px; z-index: 10;
      font: 11px/1.6 ui-monospace, monospace; color: #aab4c4;
      background: rgba(10, 14, 22, 0.6); padding: 6px 9px; border-radius: 6px;
      border: 1px solid rgba(120, 140, 180, 0.25);
    }
    #legend span { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.8/build/index.module.js",
      "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>
</head>
<body>
  <div id="hud">loading…</div>
  <div id="err" style="position:fixed;top:0;left:0;right:0;z-index:99;display:none;
       font:12px/1.5 ui-monospace,monospace;color:#ffb4b4;background:rgba(60,10,10,0.92);
       padding:8px 10px;white-space:pre-wrap;"></div>
  <script>
    // Surface any module / runtime error instead of a silent black screen.
    window.addEventListener("error", (e) => {
      const el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = "ERROR: " + (e.message || e.error) + "\n" + (e.filename || "");
    });
    window.addEventListener("unhandledrejection", (e) => {
      const el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = "PROMISE REJECTION: " + (e.reason && (e.reason.stack || e.reason.message || e.reason));
    });
  </script>
  <div id="legend">
    <span style="background:#22dd55"></span>entrance
    <span style="background:#ee3333"></span>exit
    <span style="background:#ffcc22"></span>key
    <span style="background:#33ddff"></span>spawn
    &nbsp;·&nbsp;Y is up · index = x + y·X + z·X·Y
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
